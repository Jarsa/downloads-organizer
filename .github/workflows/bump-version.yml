name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Tipo de bump"
        required: true
        default: "patch"
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bump version
        run: |
          CURRENT=$(python -c "import re; v=re.search(r'version = \"(.+?)\"', open('pyproject.toml').read()); print(v.group(1))")
          echo "Versión actual: $CURRENT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "Nueva versión: $NEW"

          sed -i "s/version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" downloads_organizer/__init__.py

          TODAY=$(date +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$NEW] - $TODAY/" CHANGELOG.md

          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV
      - name: Commit y tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml downloads_organizer/__init__.py CHANGELOG.md
          git commit -m "chore: bump version to v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin main --tags
